<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin: 0;
    font-family: "Inter", "Segoe UI", sans-serif;
    background-color: #0f172a;
    color: #e2e8f0;
    overflow: hidden;
}

#main{
    height: 100vh;
    width: 100%;
    background-color: #0f172a;
}

.container{
    height: 100%;
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    grid-template-rows: 70px 1fr 60px;
    gap: 8px;
    grid-template-areas:
            "header header header"
            "sidebar editor notes"
            "footer footer footer";
}

.header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    grid-area: header;
    background-color: #111827;
}

.sidebar{
    background-color: #1e293b;
    grid-area: sidebar;
    overflow-y: auto;
    padding: 12px;
}

.editor{
    background-color: #0f172a;
    grid-area: editor;
}

.notes{
    background-color: #1e293b;
    grid-area: notes;
    padding: 16px;
    overflow-y: auto;
}

.footer{
    background-color: #111827;
    grid-area: footer;
}

.logo,.notification{
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background-color: #2563eb;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px;
    color: white;
}

#logoouter{
    display: flex;
    align-items: center;
    justify-content: space-evenly;
}

#heading{
    padding: 20px;
}

.input-box {
    width: 100%;
    background-color: #0f172a;
    border: 1px solid #334155;
    color: #e2e8f0;
    border-radius: 6px;
    font-family: inherit;
    padding: 8px 10px;
    margin-bottom: 12px;
}

.createfolder {
    cursor: pointer;
    padding: 8px;
    color: #38bdf8;
    font-weight: 500;
}

.createfolder:hover {
    background-color: #334155;
}

.small-btn {
    display: none;
    width: 100%;
    padding: 6px;
    background-color: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 8px;
}

.small-btn:hover {
    background-color: #1d4ed8;
}

.editor{
    grid-area: editor;
    background-color: #0b1220;          
    border: 1px solid #1e293b;       
    border-radius: 8px;
    margin: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.editor textarea {
    width: 100%;
    height: 100%;
    background-color: #0f172a;
    color: #e2e8f0;
    border: none;
    outline: none;
    padding: 16px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.5;
    resize: none;
}

.editor button {
    padding: 8px 14px;
    background-color: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin: 8px;
}

.editor button:hover {
    background-color: #1d4ed8;
}

.output-box {
    background-color: #111827;
    border-top: 1px solid #1e293b;
    padding: 10px;
    font-family: monospace;
    color: #22c55e;
}

.editor{
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
    </style>
</head>
<body>
    <div id="main">
        <div class="container">
            <div class="header">
                <div id="heading"><h2>DeveloperNotesPro - Developers Soul</h2></div>
            
                <div id="logoouter">
                    <div class="logo">P</div>
                    <div class="notification">N</div>
                </div>
            </div>
            <div class="sidebar">
                <h2 class="createfolder"> + create folder</h2>
                <button id="createFileBtn" class="small-btn">+ File</button>
                <div id="folderList"></div>
            </div>
            <div class="editor"></div>
            <div class="notes">
                <h1>Explnation/Notes</h1>
                <h3>Key Concept</h3>
                    <textarea class="input-box" rows="3"></textarea>

                    <h3>Time Complexity</h3>
                    <input type="text" class="input-box" placeholder="O(n log n)">

                    <h3>Space Complexity</h3>
                    <input type="text" class="input-box" placeholder="O(1)">

                    <h3>Explanation</h3>
                    <textarea class="input-box" rows="6"></textarea>
            </div>
            <div class="footer"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
